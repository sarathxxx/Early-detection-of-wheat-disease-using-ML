{% extends "base.html" %}
{% block title %}Feedback — WheatAI{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1><i class="fas fa-star"></i> Submit Feedback</h1>
    <p class="page-sub">Help us improve WheatAI</p>
  </div>
</div>
<div class="form-page-layout">
  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label>Rating</label>
        <div class="star-rating" id="star-rating">
          {% for i in range(1,6) %}
          <span class="star" data-val="{{ i }}" onclick="setRating({{ i }})">★</span>
          {% endfor %}
        </div>
        <input type="hidden" name="rating" id="rating-input" value="5"/>
      </div>
      <div class="form-group">
        <label>Your Message</label>
        <textarea name="message" rows="5" placeholder="Share your experience, suggestions, or report any issues..." required></textarea>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Submit Feedback</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentRating = 5;
function setRating(val) {
  currentRating = val;
  document.getElementById('rating-input').value = val;
  document.querySelectorAll('.star').forEach((s,i) => {
    s.classList.toggle('active', i < val);
  });
}
setRating(5);
</script>
{% endblock %}
